name: Record Daily Scores

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  record-scores:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout latest
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Record scores
        run: python record_scores.py

      - name: Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Daily rocket score update: ${{ github.run_id }}"
          file_pattern: scores_history.json
